networks:
  lakehouse-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  hive_data:

services:

  postgres:
    image: postgres:16
    container_name: lh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: source_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d source_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lh_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-setup:
    image: minio/mc:latest
    container_name: lh_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - lakehouse-net
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing local/bronze;
      mc mb --ignore-existing local/silver;
      mc mb --ignore-existing local/gold;
      mc mb --ignore-existing local/warehouse;
      echo 'Buckets criados: bronze, silver, gold, warehouse';
      "

  hive-metastore:
    build:
      context: ./hive
      dockerfile: Dockerfile
    image: lh_hive_custom:4.0.0
    container_name: lh_hive
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://lh_postgres:5432/hive_metastore
        -Djavax.jdo.option.ConnectionUserName=admin
        -Djavax.jdo.option.ConnectionPassword=admin123
    ports:
      - "9083:9083"
    volumes:
      - hive_data:/opt/hive/data
      - ../hive/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./hive-jars/postgresql-42.7.3.jar:/opt/hive/lib/postgresql-42.7.3.jar
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD-SHELL", "python3 - <<'PY'\nimport socket, sys\ns=socket.socket(); s.settimeout(2)\ntry:\n    s.connect(('localhost', 9083))\n    s.close()\n    sys.exit(0)\nexcept Exception:\n    sys.exit(1)\nPY"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  spark-master:
    build:
      context: ./
      dockerfile: Dockerfile.spark
    image: lh_spark_custom:3.5.1
    container_name: lh_spark_master
    restart: unless-stopped
    entrypoint: ["/opt/spark/work-dir/spark-init.sh"]
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ../spark:/opt/spark/work-dir/spark
      - ../jars:/opt/spark/work-dir/jars
      - ../data:/opt/spark/work-dir/data
      - ./spark-init.sh:/opt/spark/work-dir/spark-init.sh:ro
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  trino:
    image: trinodb/trino:476
    container_name: lh_trino
    hostname: lh_trino
    restart: unless-stopped
    depends_on:
      hive-metastore:
        condition: service_started
    ports:
      - "8085:8080"
    volumes:
      - ../trino/etc:/etc/trino
      - ../data:/data
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/info')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: lh_jupyter
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
    volumes:
      - ../notebooks:/home/jovyan/work
    networks:
      - lakehouse-net